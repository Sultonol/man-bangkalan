version: '3.8'

services:
  man-bangkalan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: man-bangkalan-web
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - web-network

networks:
  web-network:
    driver: bridge